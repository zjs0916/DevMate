services:
  devmate:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    environment:
      PYTHONPATH: src
      NO_PROXY: "127.0.0.1,localhost,::1,host.docker.internal"
      no_proxy: "127.0.0.1,localhost,::1,host.docker.internal"
    stdin_open: true
    tty: true
    command: >
      bash -lc '
        PYTHONPATH=src uv run python -m devmate.mcp_search_server &
        sleep 2
        PYTHONPATH=src uv run python -m devmate.main --config config.docker.toml --interactive
      '
